<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mútuo | Cadastro Usuário</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../imagens/mutuoLogo.png">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --green-main: #588157;
      --green-dark: #3a5a40;
      --green-light: #6b9e4a;
      --cream: #E1DCD0
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background-image: url("../imagens/fundo.png");
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px
    }

    .topo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
      animation: fadeDown 0.5s ease both
    }

    .topo img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--cream);
      padding: 8px;
      object-fit: contain;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25)
    }

    .topo h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--cream);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.3px;
      margin: 0
    }

    .card-form {
      width: 100%;
      max-width: 480px;
      background: rgba(88, 129, 87, 0.649);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(225, 220, 208, 0.2);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
      animation: fadeUp 0.5s ease 0.05s both
    }

    .campo {
      margin-bottom: 20px
    }

    .campo label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 7px;
      letter-spacing: 0.2px
    }

    .campo label i {
      font-size: 0.95rem;
      color: rgba(225, 220, 208, 0.6)
    }

    .campo input,
    .campo select {
      width: 100%;
      background: rgba(225, 220, 208, 0.92);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.92rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      color: #1a2e1b;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none
    }

    .campo input::placeholder {
      color: rgba(30, 50, 30, 0.45)
    }

    .campo input:focus,
    .campo select:focus {
      border-color: var(--green-light);
      background: var(--cream);
      box-shadow: 0 0 0 3px rgba(88, 129, 87, 0.2)
    }

    .campos-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px
    }

    .divisor {
      height: 1px;
      background: rgba(225, 220, 208, 0.15);
      margin: 8px 0 24px
    }

    .btn-confirmar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--green-main);
      color: var(--cream);
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(58, 90, 64, 0.4);
      letter-spacing: 0.3px
    }

    .btn-confirmar:hover {
      background: var(--green-dark);
      box-shadow: 0 6px 22px rgba(58, 90, 64, 0.5);
      color: var(--cream)
    }

    .btn-confirmar:active {
      transform: scale(0.98)
    }

    .link-cancelar {
      display: block;
      text-align: center;
      margin-top: 14px;
      color: rgba(225, 220, 208, 0.55);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
      cursor: pointer
    }

    .link-cancelar:hover {
      color: var(--cream)
    }

    .erro {
      color: #ffb3b3;
      font-size: 0.78rem;
      margin-top: 6px;
      padding-left: 4px;
      font-weight: 600
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @media(max-width:480px) {
      .card-form {
        padding: 28px 20px
      }

      .campos-row {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div class="topo">
    <img src="../imagens/logo.png" alt="Logo Mútuo" onerror="this.style.display='none'">
    <h1>Cadastro de usuário</h1>
  </div>
  <div class="card-form">
    <div class="campo">
      <label for="endereco"><i class="bi bi-geo-alt-fill"></i> Endereço</label>
      <input type="text" id="endereco" placeholder="Rua e N°" required autofocus>
      <p class="erro" id="erroEndereco"></p>
    </div>
    <div class="campo">
      <label for="bairro"><i class="bi bi-map-fill"></i> Bairro</label>
      <input type="text" id="bairro" placeholder="Bairro" required>
      <p class="erro" id="erroBairro"></p>
    </div>
    <div class="campo">
      <label for="cidade"><i class="bi bi-buildings-fill"></i> Cidade</label>
      <input type="text" id="cidade" placeholder="Cidade" required>
      <p class="erro" id="erroCidade"></p>
    </div>
    <div class="campos-row">
      <div class="campo">
        <label for="estado"><i class="bi bi-map-fill"></i> Estado (UF)</label>
        <input type="text" id="estado" placeholder="Ex: SP" maxlength="2" required>
        <p class="erro" id="erroEstado"></p>
      </div>
      <div class="campo">
        <label for="cep"><i class="bi bi-mailbox-fill"></i> CEP</label>
        <input type="text" id="cep" placeholder="00000-000" required>
        <p class="erro" id="erroCep"></p>
      </div>
    </div>
    <div class="divisor"></div>
    <button class="btn-confirmar" id="finalizar" type="button">
      <i class="bi bi-check-circle-fill"></i> Finalizar cadastro
    </button>
    <a class="link-cancelar" onclick="window.location.href='cadastroPessoal.html'">Voltar</a>
  </div>
  <script>
document.getElementById('estado').addEventListener('input', function () {
  this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '');
});

document.getElementById('cep').addEventListener('input', function () {
  let v = this.value.replace(/\D/g, '').slice(0, 8);
  if (v.length > 5) {
    v = v.replace(/^(\d{5})(\d{0,3})/, '$1-$2');
  }
  this.value = v;
});

document.getElementById('finalizar').addEventListener('click', async () => {

  const endereco = document.getElementById('endereco').value.trim();
  const bairro   = document.getElementById('bairro').value.trim();
  const cidade   = document.getElementById('cidade').value.trim();
  const estado   = document.getElementById('estado').value.trim();
  const cep      = document.getElementById('cep').value.trim();

  document.getElementById('erroEndereco').textContent = '';
  document.getElementById('erroBairro').textContent   = '';
  document.getElementById('erroCidade').textContent   = '';
  document.getElementById('erroEstado').textContent   = '';
  document.getElementById('erroCep').textContent      = '';

  let valido = true;

  if (!endereco) { document.getElementById('erroEndereco').textContent = 'Digite o endereço.'; valido = false; }
  if (!bairro)   { document.getElementById('erroBairro').textContent   = 'Digite o bairro.';   valido = false; }
  if (!cidade)   { document.getElementById('erroCidade').textContent   = 'Digite a cidade.';   valido = false; }
  if (!estado)   { document.getElementById('erroEstado').textContent   = 'Digite o estado.';   valido = false; }

  const cepNums = cep.replace(/\D/g, '');
  if (!cep) {
    document.getElementById('erroCep').textContent = 'Digite o CEP.';
    valido = false;
  } else if (cepNums.length < 8) {
    document.getElementById('erroCep').textContent = 'Digite um CEP válido.';
    valido = false;
  }

  if (!valido) return;

  const dados = JSON.parse(sessionStorage.getItem('cadastroMutuo') || '{}');
  dados.endereco = endereco;
  dados.bairro   = bairro;
  dados.cidade   = cidade;
  dados.uf       = estado;
  dados.cep      = cepNums;
  dados.cadastro = new Date().toISOString().slice(0, 10);

  console.log('DADOS ENVIADOS:', dados);

  try {
    // 1. Cadastra o usuário
    const resp = await fetch('http://localhost:3000/usuarios', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dados)
    });

    const texto = await resp.text();
    let resultado;
    try { resultado = JSON.parse(texto); }
    catch { throw new Error('API retornou resposta inválida: ' + texto); }

    if (!resp.ok || !resultado.sucesso) {
      Swal.fire({ icon: 'error', title: 'Erro', text: resultado.erro || resultado.mensagem || 'Erro ao cadastrar.' });
      return;
    }

    // 2. Envia a foto se o usuário escolheu uma
    if (dados.fotoBase64) {
      const base64 = dados.fotoBase64.split(',')[1];
      const mime   = dados.fotoBase64.split(';')[0].split(':')[1];
      const bytes  = atob(base64);
      const arr    = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      const blob = new Blob([arr], { type: mime });

      const formData = new FormData();
      formData.append('cpf', dados.cpf);
      formData.append('fotoPerfil', blob, 'foto.jpg');

      await fetch('http://localhost:3000/perfil/foto', {
        method: 'POST',
        body: formData
      });
    }

    sessionStorage.removeItem('cadastroMutuo');

    await Swal.fire({
      icon: 'success',
      title: 'Cadastro realizado!',
      text: 'Sua conta foi criada com sucesso.',
      confirmButtonText: 'Entrar',
      confirmButtonColor: '#3a5a40',
      heightAuto: false
    });

    window.location.href = '../login.html';

  } catch (e) {
    console.error('ERRO COMPLETO:', e);
    Swal.fire({ icon: 'error', title: 'Não foi possível conectar à API', text: e.message });
  }

});
</script>
</body>

</html>
