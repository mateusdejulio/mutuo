<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação de Login - Mútuo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="imagens/mutuoLogo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap');

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url("imagens/fundo.png");
            background-size: cover;
            background-position: center;
            height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            color: #E1DCD0;
        }

        #container {
            background-color: #588157b3;
            width: 35%;
            min-width: 320px;
            height: 65%;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        #logo {
            background-color: #E1DCD0;
            border-radius: 50%;
            padding: 5px;
        }

        h1 {
            color: #E1DCD0;
            font-weight: 600;
            font-size: 36px;
            margin-top: 10px;
        }

        h2 {
            color: #E1DCD0;
            font-weight: 400;
            font-size: 24px;
            margin-top: 40px;
        }

        p {
            color: #E1DCD0;
            margin-top: 10px;
            font-size: 16px;
        }

        #confirmar {
            background-color: #b7ce8f;
            color: #3a5a40;
            border: none;
            border-radius: 25px;
            width: 250px;
            height: 44px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 40px;
            cursor: pointer;
            transition: 0.3s;
        }

        #confirmar:hover {
            background-color: #a8c27e;
        }

        @media (max-width: 800px) {
            #container {
                width: 80%;
                height: 70%;
            }
        }
    </style>
</head>
<body>

    <div id="container">
        <img id="logo" src="imagens/logo.png" height="90">
        <h1>Mútuo</h1>
        <h2>Cadastro realizado com sucesso!</h2>
        <p>Bem-vindo(a) à nossa plataforma, esperamos que tenha uma ótima experiência.</p>

        <button id="confirmar">Ir para o Início</button>
       
    
    </div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
document.getElementById('confirmar').addEventListener('click', () => {
    const params = new URLSearchParams(window.location.search);
    const tipo = params.get('tipo');

    if (tipo === 'ong') {
        window.location.href = 'usuárioOng/homeOngMutuo.html';
    } else {
        window.location.href = 'usuárioComum/homeMutuo.html';
    }
});</script>
</body>
</html>
