<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Mútuo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="icon" href="imagens/mutuoLogo.png">
  <style>
    :root {
      --green-main: #588157;
      --green-dark: #3a5a40;
      --green-light: #6b9e4a;
      --cream: #E1DCD0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background-image: url("imagens/fundo.png");
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px 60px;
      overflow: hidden
    }

    .topo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
      animation: fadeDown 0.5s ease both
    }

    .topo img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--cream);
      padding: 5px;
      object-fit: contain;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25)
    }

    .topo h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--cream);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.3px;
      margin: 0
    }

    .card-form {
      width: 100%;
      max-width: 480px;
      background: rgba(88, 129, 87, 0.649);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(225, 220, 208, 0.2);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
      animation: fadeUp 0.5s ease 0.05s both
    }

    .campo {
      margin-bottom: 10px
    }

    .campo label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 7px;
      letter-spacing: 0.2px
    }

    .campo label i {
      font-size: 0.95rem;
      color: rgba(225, 220, 208, 0.6)
    }

    .campo input[type="text"],
    .campo input[type="email"],
    .campo input[type="tel"] {
      width: 100%;
      background: rgba(225, 220, 208, 0.92);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.92rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      color: #1a2e1b;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none
    }

    .campo input::placeholder {
      color: rgba(30, 50, 30, 0.45)
    }

    .campo input:focus {
      border-color: var(--green-light);
      background: var(--cream);
      box-shadow: 0 0 0 3px rgba(88, 129, 87, 0.2)
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 12px;
      letter-spacing: 0.2px
    }

    .radio-label i {
      font-size: 0.95rem;
      color: rgba(225, 220, 208, 0.6)
    }

    .opcoes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .opcao input[type="radio"] {
      display: none
    }

    .opcao label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      background: rgba(225, 220, 208, 0.10);
      border: 2px solid rgba(225, 220, 208, 0.18);
      border-radius: 14px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(225, 220, 208, 0.75);
      transition: all 0.2s;
      text-align: center;
      letter-spacing: 0.1px;
      line-height: 1.3
    }

    .opcao label i {
      font-size: 1.5rem;
      color: rgba(225, 220, 208, 0.5);
      transition: color 0.2s
    }

    .opcao label:hover {
      background: rgba(225, 220, 208, 0.16);
      border-color: rgba(225, 220, 208, 0.35);
      color: var(--cream)
    }

    .opcao label:hover i {
      color: rgba(225, 220, 208, 0.8)
    }

    .opcao input[type="radio"]:checked+label {
      background: rgba(88, 129, 87, 0.35);
      border-color: rgba(168, 197, 160, 0.7);
      color: var(--cream);
      box-shadow: 0 0 0 3px rgba(88, 129, 87, 0.2)
    }

    .opcao input[type="radio"]:checked+label i {
      color: #b7ce8f
    }

    .divisor {
      height: 1px;
      background: rgba(225, 220, 208, 0.15);
      margin: 8px 0 24px
    }

    .btn-confirmar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--green-main);
      color: var(--cream);
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(58, 90, 64, 0.4);
      letter-spacing: 0.3px
    }

    .btn-confirmar:hover {
      background: var(--green-dark);
      box-shadow: 0 6px 22px rgba(58, 90, 64, 0.5);
      color: var(--cream)
    }

    .btn-confirmar:active {
      transform: scale(0.98)
    }

    .link-cancelar {
      display: block;
      text-align: center;
      margin-top: 14px;
      color: rgba(225, 220, 208, 0.55);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
      cursor: pointer
    }

    .link-cancelar:hover {
      color: var(--cream)
    }

    .erro {
      color: #ffb3b3;
      font-size: 0.78rem;
      margin-top: 6px;
      padding-left: 4px;
      font-weight: 600
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @media(max-width:480px) {
      .card-form {
        padding: 28px 20px
      }
    }
  </style>
</head>

<body>
  <div class="topo">
    <img src="imagens/logo.png" alt="Logo Mútuo" onerror="this.style.display='none'">
    <h1>Mútuo</h1>
  </div>
  <div class="card-form">
    <div class="campo">
      <label for="nome"><i class="bi bi-person-fill"></i> Nome</label>
      <input type="text" id="nome" placeholder="Seu nome completo" required autofocus>
      <p class="erro" id="erroNome"></p>
    </div>
    <div class="campo">
      <label for="email"><i class="bi bi-envelope-fill"></i> Email</label>
      <input type="email" id="email" placeholder="seu@email.com" required>
      <p class="erro" id="erroEmail"></p>
    </div>
    <div class="campo">
      <label for="telefone"><i class="bi bi-telephone-fill"></i> Telefone</label>
      <input type="tel" id="telefone" placeholder="(19) 99999-9999" required>
      <p class="erro" id="erroTelefone"></p>
    </div>
    <div class="campo">
      <div class="radio-label"><i class="bi bi-people-fill"></i> Tipo de conta</div>
      <div class="opcoes">
        <div class="opcao">
          <input type="radio" id="usuario" name="tipo" value="usuario">
          <label for="usuario"><i class="bi bi-person-circle"></i>Usuário Comum</label>
        </div>
        <div class="opcao">
          <input type="radio" id="ong" name="tipo" value="ong">
          <label for="ong"><i class="bi bi-building-fill"></i>Representante de ONG</label>
        </div>
      </div>
      <p class="erro" id="erroTipo"></p>
    </div>
    <div class="divisor"></div>
    <button class="btn-confirmar" id="cadastrar" type="button">
      <i class="bi bi-arrow-right-circle-fill"></i> Próximo
    </button>
    <a class="link-cancelar" onclick="window.location.href='login.html'">Voltar</a>
  </div>
  <script>
    // Limpa o cadastro anterior ao entrar na primeira página
    sessionStorage.removeItem('cadastroMutuo');

    document.getElementById('telefone').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 11);
      if (v.length > 6) v = v.replace(/^(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
      else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
      else if (v.length > 0) v = v.replace(/^(\d{0,2})/, '($1');
      this.value = v;
    });

    document.getElementById('cadastrar').addEventListener('click', () => {
      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const telefone = document.getElementById('telefone').value.trim();
      const selecao = document.querySelector('input[name="tipo"]:checked');

      document.getElementById('erroNome').textContent = '';
      document.getElementById('erroEmail').textContent = '';
      document.getElementById('erroTelefone').textContent = '';
      document.getElementById('erroTipo').textContent = '';

      let valido = true;

      if (!nome) { document.getElementById('erroNome').textContent = 'Digite seu nome.'; valido = false; }

      const emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email) { document.getElementById('erroEmail').textContent = 'Digite seu e-mail.'; valido = false; }
      else if (!emailReg.test(email)) { document.getElementById('erroEmail').textContent = 'Digite um e-mail válido.'; valido = false; }

      const telNums = telefone.replace(/\D/g, '');
      if (!telefone) { document.getElementById('erroTelefone').textContent = 'Digite seu telefone.'; valido = false; }
      else if (telNums.length < 11) { document.getElementById('erroTelefone').textContent = 'Digite um telefone válido.'; valido = false; }

      if (!selecao) { document.getElementById('erroTipo').textContent = 'Selecione um tipo de conta.'; valido = false; }

      if (valido) {
       
        sessionStorage.setItem('cadastroMutuo', JSON.stringify({
          nome,
          email,
          telefone: telNums,
          tipo: selecao.value
        }));

        if (selecao.value === 'ong') {
          window.location.href = 'usuárioOng/cadastroOng1.html';
        } else {
          window.location.href = 'usuárioComum/cadastroPessoal.html';
        }
      }
    });
  </script>
</body>

</html>
