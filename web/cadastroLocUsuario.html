        @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap');

        body {
            display: flex;
            background-image: url("imagens/fundo.png");
            background-size: cover;
            align-items: center;
            justify-content: center;

            overflow: hidden;

            font-weight: 400;
            font-family: 'Quicksand', sans-serif;
        }

        @media (max-width: 800px) {
            #divLogin {
                width: 40%;
                height: 75%;
            }
        }
        
        ::placeholder{
            text-align: left;
        }



        input[type="radio"] {
            display: none;
        }

        .opcoes label{
            padding: 10px 15px;
            border: 2px solid #E1DCD0;
            border-radius: 25px;
            cursor: pointer;
            display: inline-block;
            width: 200px;
            text-align: center;
            font-size: 15px;
        }

        .opcoes input[type="radio"]:checked + label {
            background-color: #3a5a40;

</head>
<body>

    <div id="divLogin">
        <table>
            <tr>
                <td><img id="logo" src="imagens/logo.png" height="80px"></td>
                <td><h1>Mútuo</h1></td>
              
            </tr>
            <!--<tr><td><h2>Adm</h2></td></tr>-->
        </table>

        <br><br>

        <form>
            <label>Endereço:</label><br>
            <input type="text" id="endereco" placeholder="  Rua e N°" required autofocus >
            <br><br>
            <label>Cidade:</label><br>
            <input type="text" id="cidade" placeholder="  Cidade" required>
            <br><br>
            <label>Estado:</label><br>
            <input type="text" id="estado" placeholder="  Estado" required>
            <br><br>
            <label>CEP:</label><br>
            <input type="text" id="cep" placeholder="  CEP" required>
            <br><br>
        

            <br><br><br>
            <!--<input type="button" id="logar" value="Login" width="200px">-->
            <button id="proximo" type="button">Finalizar</button>
            <br>
            <center><button id="voltar" type="button" onclick="window.location.href='cadastroPessoalhtml'">Voltar</button></center>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


    
    
    <script>
        document.getElementById('proximo').addEventListener('click', async () => {
            const enderecoValue = document.getElementById('endereco').value;
            const cidadeValue = document.getElementById('cidade').value;
            const estadoValue = document.getElementById('estado').value;
            const cepValue = document.getElementById('cep').value;
            if(!enderecoValue || !cidadeValue || !estadoValue || !cepValue) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Ops...',
                    text: 'Preencha o Endereço, Cidade, Estado e CEP para continuar!',
                    confirmButtonText: 'Entendi',
                    confirmButtonColor: '#3a5a40',
                    heightAuto: false
                });
            } else {

                Swal.fire({
                    icon: 'success',
                    title: 'Cadastro realizado!',
                    text: 'Seu cadastro foi realizado com sucesso.',
                    confirmButtonText: 'Ótimo',
                    confirmButtonColor: '#3a5a40',
                    heightAuto: false
                });
                window.location.href = "cadastroConfirmacao.html";  
            }
        });
    </script>

</body>
