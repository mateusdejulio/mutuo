<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mútuo | Cadastro ONG</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../imagens/mutuoLogo.png">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --green-main: #588157;
      --green-dark: #3a5a40;
      --green-light: #6b9e4a;
      --cream: #E1DCD0;
      --cream-dark: #cdc7ba;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Quicksand', sans-serif;
      background-image: url("../imagens/fundo.png");
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    /* ── TOPO ── */
    .topo {
      display: flex;
      margin-top: 0;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
      animation: fadeDown 0.5s ease both;
    }

    .topo img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--cream);
      padding: 8px;
      object-fit: contain;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    .topo h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--cream);
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      letter-spacing: 0.3px;
      margin: 0;
    }

    /* ── CARD ── */
    .card-form {
      width: 100%; max-width: 480px;
      background: rgba(88, 129, 87, 0.649);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(225,220,208,0.2);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      animation: fadeUp 0.5s ease 0.05s both;
    }

    /* ── CAMPO ── */
    .campo { margin-bottom: 20px; }

    .campo label {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.85rem; font-weight: 700;
      color: var(--cream);
      margin-bottom: 7px;
      letter-spacing: 0.2px;
    }
    .campo label i {
      font-size: 0.95rem;
      color: rgba(225,220,208,0.6);
    }

    .campo input {
      width: 100%;
      background: rgba(225,220,208,0.92);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.92rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      color: #1a2e1b;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .campo input::placeholder {
      color: rgba(30,50,30,0.45);
    }
    .campo input:focus {
      border-color: var(--green-light);
      background: var(--cream);
      box-shadow: 0 0 0 3px rgba(88,129,87,0.2);
    }

    /* Input date styling */
    .campo input[type="date"] {
      color: #1a2e1b;
    }
    .campo input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.5;
      cursor: pointer;
    }

    /* ── LINHA DE 2 CAMPOS ── */
    .campos-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── DIVISOR ── */
    .divisor {
      height: 1px;
      background: rgba(225,220,208,0.15);
      margin: 8px 0 24px;
    }

    /* ── BOTÃO CONFIRMAR ── */
    .btn-confirmar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      background: var(--green-main);
      color: var(--cream);
      border: none; border-radius: 14px;
      padding: 15px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem; font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(58,90,64,0.4);
      letter-spacing: 0.3px;
    }
    .btn-confirmar:hover {
      background: var(--green-dark);
      box-shadow: 0 6px 22px rgba(58,90,64,0.5);
      color: var(--cream);
    }
    .btn-confirmar:active { transform: scale(0.98); }

    /* ── LINK VOLTAR ── */
    .link-cancelar {
      display: block; text-align: center;
      margin-top: 14px;
      color: rgba(225,220,208,0.55);
      font-size: 0.82rem; font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
      cursor: pointer;
    }
    .link-cancelar:hover { color: var(--cream); }

    /* ── ANIMAÇÕES ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card-form { padding: 28px 20px; }
      .campos-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="topo">
    <img src="../imagens/logo.png" alt="Logo Mútuo" onerror="this.style.display='none'">
    <h1>Cadastro de ONG</h1>
  </div>

  <div class="card-form">

    <div class="campo">
      <label for="nomeOng"><i class="bi bi-building-fill"></i> Nome da ONG</label>
      <input type="text" id="nomeOng" placeholder="Nome da ONG" required autofocus>
    </div>

    <div class="campo">
      <label for="cnpj"><i class="bi bi-file-earmark-text-fill"></i> CNPJ</label>
      <input type="text" id="cnpj" placeholder="CNPJ" required>
    </div>

    <div class="campos-row">
      <div class="campo">
        <label for="senha"><i class="bi bi-lock-fill"></i> Senha</label>
        <input type="password" id="senha" placeholder="Senha" required>
      </div>

      <div class="campo">
        <label for="dataFundacao"><i class="bi bi-calendar-fill"></i> Fundação</label>
        <input type="date" id="dataFundacao" required>
      </div>
    </div>

    <div class="divisor"></div>

    <button class="btn-confirmar" id="proximo" type="button">
      <i class="bi bi-arrow-right-circle-fill"></i> Próximo
    </button>
    <a class="link-cancelar" onclick="window.location.href='../cadastro.html'">Voltar</a>

  </div>

  <script>
    document.getElementById('proximo').addEventListener('click', () => {
      const nomeOngValue      = document.getElementById('nomeOng').value;
      const cnpjValue         = document.getElementById('cnpj').value;
      const senhaValue        = document.getElementById('senha').value;
      const dataFundacaoValue = document.getElementById('dataFundacao').value;

      if (!nomeOngValue || !cnpjValue || !senhaValue || !dataFundacaoValue) {
        Swal.fire({
          icon: 'warning',
          title: 'Ops...',
          text: 'Preencha o Nome, CNPJ, Senha e Data de fundação para continuar!',
          confirmButtonText: 'Entendi',
          confirmButtonColor: '#3a5a40',
          heightAuto: false
        });
      } else {
        const params = new URLSearchParams(window.location.search);
        const tipo = params.get('tipo');
        window.location.href = `cadastroLocOng.html?tipo=${tipo}`;
      }
    });
  </script>

</body>
</html>
