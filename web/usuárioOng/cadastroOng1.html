<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mútuo | Cadastro ONG</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../imagens/mutuoLogo.png">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --green-main: #588157;
      --green-dark: #3a5a40;
      --green-light: #6b9e4a;
      --cream: #E1DCD0
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background-image: url("../imagens/fundo.png");
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px
    }

    .topo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
      animation: fadeDown 0.5s ease both
    }

    .topo img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--cream);
      padding: 8px;
      object-fit: contain;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25)
    }

    .topo h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--cream);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.3px;
      margin: 0
    }

    .card-form {
      width: 100%;
      max-width: 480px;
      background: rgba(88, 129, 87, 0.649);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(225, 220, 208, 0.2);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
      animation: fadeUp 0.5s ease 0.05s both
    }

    .campo {
      margin-bottom: 20px
    }

    .campo label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 7px;
      letter-spacing: 0.2px
    }

    .campo label i {
      font-size: 0.95rem;
      color: rgba(225, 220, 208, 0.6)
    }

    .campo input,
    .campo textarea {
      width: 100%;
      background: rgba(225, 220, 208, 0.92);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.92rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      color: #1a2e1b;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none
    }

    .campo textarea {
      resize: vertical;
      min-height: 80px
    }

    .campo input::placeholder,
    .campo textarea::placeholder {
      color: rgba(30, 50, 30, 0.45)
    }

    .campo input:focus,
    .campo textarea:focus {
      border-color: var(--green-light);
      background: var(--cream);
      box-shadow: 0 0 0 3px rgba(88, 129, 87, 0.2)
    }

    .campo input[type="date"] {
      color: #1a2e1b
    }

    .campo input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.5;
      cursor: pointer
    }

    .campos-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px
    }

    .divisor {
      height: 1px;
      background: rgba(225, 220, 208, 0.15);
      margin: 8px 0 24px
    }

    .btn-confirmar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--green-main);
      color: var(--cream);
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(58, 90, 64, 0.4);
      letter-spacing: 0.3px
    }

    .btn-confirmar:hover {
      background: var(--green-dark);
      box-shadow: 0 6px 22px rgba(58, 90, 64, 0.5);
      color: var(--cream)
    }

    .btn-confirmar:active {
      transform: scale(0.98)
    }

    .link-cancelar {
      display: block;
      text-align: center;
      margin-top: 14px;
      color: rgba(225, 220, 208, 0.55);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
      cursor: pointer
    }

    .link-cancelar:hover {
      color: var(--cream)
    }

    .erro {
      color: #ffb3b3;
      font-size: 0.78rem;
      margin-top: 6px;
      padding-left: 4px;
      font-weight: 600
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @media(max-width:480px) {
      .card-form {
        padding: 28px 20px
      }

      .campos-row {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div class="topo">
    <img src="../imagens/logo.png" alt="Logo Mútuo" onerror="this.style.display='none'">
    <h1>Cadastro de ONG</h1>
  </div>
  <div class="card-form">
    <div class="campo">
      <label for="nomeOng"><i class="bi bi-building-fill"></i> Nome da ONG</label>
      <input type="text" id="nomeOng" placeholder="Nome da ONG" required autofocus>
      <p class="erro" id="erroNome"></p>
    </div>
    <div class="campo">
      <label for="cnpj"><i class="bi bi-file-earmark-text-fill"></i> CNPJ</label>
      <input type="text" id="cnpj" placeholder="00.000.000/0000-00" required>
      <p class="erro" id="erroCnpj"></p>
    </div>
    <div class="campos-row">
      <div class="campo">
        <label for="senha"><i class="bi bi-lock-fill"></i> Senha</label>
        <input type="password" id="senha" placeholder="Senha" required>
        <p class="erro" id="erroSenha"></p>
      </div>
      <div class="campo">
        <label for="dataFundacao"><i class="bi bi-calendar-fill"></i> Fundação</label>
        <input type="date" id="dataFundacao" required>
        <p class="erro" id="erroData"></p>
      </div>
    </div>
    <div class="campo">
      <label for="foco"><i class="bi bi-bullseye"></i> Foco de atuação</label>
      <input type="text" id="foco" placeholder="Ex: Meio ambiente, Educação..." required>
      <p class="erro" id="erroFoco"></p>
    </div>
    <div class="campo">
      <label for="descricao"><i class="bi bi-card-text"></i> Descrição</label>
      <textarea id="descricao" placeholder="Descreva brevemente a ONG..." required></textarea>
      <p class="erro" id="erroDescricao"></p>
    </div>
    <div class="divisor"></div>

<div class="campo">
  <label for="fotoPerfil"><i class="bi bi-camera-fill"></i> Foto de perfil</label>

  <!-- Preview circular -->
  <div style="display:flex; align-items:center; gap:16px; margin-bottom:10px">
    <img id="previewFoto" src="../imagens/mutuoLogo.png"
      style="width:72px; height:72px; border-radius:50%; object-fit:cover;
             border:3px solid rgba(225,220,208,0.5); background:var(--cream)">
    <div>
      <label for="fotoPerfil" style="cursor:pointer; background:var(--green-dark);
        color:var(--cream); border-radius:10px; padding:8px 14px;
        font-size:0.82rem; font-weight:600; display:inline-flex;
        align-items:center; gap:6px; margin-bottom:0">
        <i class="bi bi-upload"></i> Escolher foto
      </label>
      <p style="color:rgba(225,220,208,0.55); font-size:0.75rem; margin-top:5px">
        JPG ou PNG, até 5 MB
      </p>
    </div>
  </div>

  <input type="file" id="fotoPerfil" accept="image/jpeg,image/png"
    style="display:none">
</div>
    <div class="divisor"></div>
    <button class="btn-confirmar" id="proximo" type="button">
      <i class="bi bi-arrow-right-circle-fill"></i> Próximo
    </button>
    <a class="link-cancelar" onclick="window.location.href='../cadastro.html'">Voltar</a>
  </div>
  <script>
    document.getElementById('cnpj').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 14);
      v = v.replace(/^(\d{2})(\d)/, '$1.$2');
      v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
      v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
      v = v.replace(/(\d{4})(\d)/, '$1-$2');
      this.value = v;
    });

    // ✅ Listener da foto — fora do clique
    document.getElementById('fotoPerfil').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        Swal.fire({ icon: 'warning', title: 'Arquivo grande', text: 'A foto deve ter no máximo 5 MB.' });
        this.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('previewFoto').src = e.target.result;
        const dados = JSON.parse(sessionStorage.getItem('cadastroMutuo') || '{}');
        dados.fotoBase64 = e.target.result;
        sessionStorage.setItem('cadastroMutuo', JSON.stringify(dados));
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('proximo').addEventListener('click', () => {
      const nomeOng = document.getElementById('nomeOng').value.trim();
      const cnpj = document.getElementById('cnpj').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const dataFundacao = document.getElementById('dataFundacao').value;
      const foco = document.getElementById('foco').value.trim();
      const descricao = document.getElementById('descricao').value.trim();

      document.getElementById('erroNome').textContent = '';
      document.getElementById('erroCnpj').textContent = '';
      document.getElementById('erroSenha').textContent = '';
      document.getElementById('erroData').textContent = '';
      document.getElementById('erroFoco').textContent = '';
      document.getElementById('erroDescricao').textContent = '';

      let valido = true;

      if (!nomeOng) { document.getElementById('erroNome').textContent = 'Digite o nome da ONG.'; valido = false; }

      const cnpjNums = cnpj.replace(/\D/g, '');
      if (!cnpj) { document.getElementById('erroCnpj').textContent = 'Digite o CNPJ.'; valido = false; }
      else if (cnpjNums.length < 14) { document.getElementById('erroCnpj').textContent = 'Digite um CNPJ válido.'; valido = false; }

      if (!senha) { document.getElementById('erroSenha').textContent = 'Digite sua senha.'; valido = false; }
      else if (senha.length < 8) { document.getElementById('erroSenha').textContent = 'A senha deve ter no mínimo 8 caracteres.'; valido = false; }

      if (!dataFundacao) { document.getElementById('erroData').textContent = 'Selecione a data de fundação.'; valido = false; }
      if (!foco) { document.getElementById('erroFoco').textContent = 'Digite o foco de atuação.'; valido = false; }
      if (!descricao) { document.getElementById('erroDescricao').textContent = 'Digite uma descrição.'; valido = false; }

      if (valido) {
        const dados = JSON.parse(sessionStorage.getItem('cadastroMutuo') || '{}');
        dados.nomeOng = nomeOng;
        dados.cnpj = cnpjNums;
       
        dados.nomeResponsavel = dados.nome;
        dados.senha = senha;
        dados.dataFundacao = dataFundacao;
        dados.foco = foco;
        dados.descricao = descricao;
        sessionStorage.setItem('cadastroMutuo', JSON.stringify(dados));
        window.location.href = 'cadastroLocOng.html';
      }
    });
  </script>
</body>

</html>
