<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Mútuo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="icon" href="imagens/mutuoLogo.png">

  <style>
    :root {
      --green-main:  #588157;
      --green-dark:  #3a5a40;
      --green-light: #6b9e4a;
      --cream:       #E1DCD0;
      --cream-dark:  #cdc7ba;
      --white:       #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Quicksand', sans-serif;
      background-image: url("imagens/fundo.png");
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    .topo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
      animation: fadeDown 0.5s ease both;
    }

    .topo img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--cream);
      padding: 8px;
      object-fit: contain;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    .topo h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--cream);
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      letter-spacing: 0.3px;
      margin: 0;
    }

    .card-form {
      width: 100%;
      max-width: 480px;
      background: rgba(88, 129, 87, 0.649);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(225,220,208,0.2);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      animation: fadeUp 0.5s ease 0.05s both;
    }

    .campo { margin-bottom: 20px; }

    .campo label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 7px;
      letter-spacing: 0.2px;
    }

    .campo label i {
      font-size: 0.95rem;
      color: rgba(225,220,208,0.6);
    }

    .campo input {
      width: 100%;
      background: rgba(225,220,208,0.92);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.92rem;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      color: #1a2e1b;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .campo input::placeholder { color: rgba(30,50,30,0.45); }

    .campo input:focus {
      border-color: var(--green-light);
      background: var(--cream);
      box-shadow: 0 0 0 3px rgba(88,129,87,0.2);
    }

    .link-esqueceu { text-align: right; margin-top: 6px; }

    .link-esqueceu a {
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(225,220,208,0.6);
      text-decoration: none;
      transition: color 0.2s;
    }

    .link-esqueceu a:hover { color: var(--cream); }

    .divisor {
      height: 1px;
      background: rgba(225,220,208,0.15);
      margin: 8px 0 24px;
    }

    .btn-confirmar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--green-main);
      color: var(--cream);
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(58,90,64,0.4);
      letter-spacing: 0.3px;
    }

    .btn-confirmar:hover {
      background: var(--green-dark);
      box-shadow: 0 6px 22px rgba(58,90,64,0.5);
    }

    .btn-confirmar:active { transform: scale(0.98); }

    .form-rodape {
      text-align: center;
      margin-top: 14px;
      color: rgba(225,220,208,0.55);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .form-rodape a {
      color: rgba(225,220,208,0.85);
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .form-rodape a:hover { color: var(--cream); }

    .erro {
      color: #ffb3b3;
      font-size: 0.78rem;
      margin-top: 6px;
      font-weight: 600;
      padding-left: 4px;
    }

    /* Toggle Usuário / ONG */
    .toggle-tipo {
      display: flex;
      background: rgba(30, 60, 30, 0.45);
      border-radius: 18px;
      padding: 5px;
      margin-bottom: 26px;
      position: relative;
      border: 1px solid rgba(225,220,208,0.15);
    }

    .toggle-tipo::before {
      content: '';
      position: absolute;
      top: 5px; left: 5px;
      width: calc(50% - 5px);
      height: calc(100% - 10px);
      background: var(--green-main);
      border-radius: 13px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 3px 12px rgba(58,90,64,0.4);
    }

    .toggle-tipo.ong-ativo::before { transform: translateX(100%); }

    .toggle-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 11px 16px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: rgba(225,220,208,0.5);
      cursor: pointer;
      border-radius: 13px;
      position: relative;
      z-index: 1;
      transition: color 0.25s;
      letter-spacing: 0.2px;
    }

    .toggle-btn.ativo { color: var(--cream); }

    
    .mutuo-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,50,30,0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .mutuo-overlay.show { display: flex; }

    .mutuo-alert {
      background: var(--green-dark);
      border: 1px solid rgba(225,220,208,0.25);
      border-radius: 28px;
      padding: 40px 36px 32px;
      text-align: center;
      width: 320px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.4);
      transform: scale(0.7) translateY(20px);
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
    }

    .mutuo-overlay.show .mutuo-alert {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .mutuo-check-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      position: relative;
    }

    .mutuo-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(225,220,208,0.12);
      border: 3px solid rgba(225,220,208,0.35);
      position: absolute;
    }

    .mutuo-circle.pulse {
      animation: ringPulse 0.6s ease forwards;
    }

    @keyframes ringPulse {
      0%   { transform: scale(0.6); opacity: 0; }
      60%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .mutuo-check {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mutuo-check svg {
      width: 36px; height: 36px;
      stroke: var(--cream);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .check-path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
    }

    .check-path.draw {
      animation: drawCheck 0.45s ease 0.35s forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    .mutuo-title {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--cream);
      margin: 0 0 6px;
      letter-spacing: 0.2px;
    }

    .mutuo-sub {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: rgba(225,220,208,0.65);
      margin: 0 0 24px;
    }

    .mutuo-bar-wrap {
      background: rgba(225,220,208,0.15);
      border-radius: 99px;
      height: 4px;
      overflow: hidden;
      margin: 0 0 8px;
    }

    .mutuo-bar {
      height: 100%;
      width: 0%;
      background: var(--cream);
      border-radius: 99px;
    }

    .mutuo-bar.go {
      animation: fillBar 1.8s linear 0.2s forwards;
    }

    @keyframes fillBar { to { width: 100%; } }

    .mutuo-hint {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.72rem;
      color: rgba(225,220,208,0.4);
      font-weight: 600;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card-form { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="topo">
    <img src="imagens/logo.png" alt="Logo Mútuo" onerror="this.style.display='none'">
    <h1>Mútuo</h1>
  </div>

  <div class="card-form">

    <div class="toggle-tipo" id="toggleTipo">
      <button class="toggle-btn ativo" id="btnUsuario" onclick="selecionarTipo('usuario')">
        Usuário Comum
      </button>
      <button class="toggle-btn" id="btnOng" onclick="selecionarTipo('ong')">
        ONG
      </button>
    </div>

    <div class="campo">
      <label for="login"><i class="bi bi-envelope-fill"></i> <span id="labelLogin">E-mail</span></label>
      <input type="text" id="login" placeholder="Seu e-mail" required autofocus>
      <p class="erro" id="erroEmail"></p>
    </div>

    <div class="campo">
      <label for="senha"><i class="bi bi-lock-fill"></i> Senha</label>
      <input type="password" id="senha" placeholder="Sua senha" required>
      <p class="erro" id="erroSenha"></p>
      <div class="link-esqueceu">
        <a href="#">Esqueceu sua senha?</a>
      </div>
    </div>

    <div class="divisor"></div>

    <button class="btn-confirmar" id="logar" type="button">
      <i class="bi bi-box-arrow-in-right"></i> Entrar
    </button>

    <div class="form-rodape">
      Não tem conta? <a href="cadastro.html">Cadastre-se aqui</a>
    </div>

  </div>


  <div class="mutuo-overlay" id="mutuoOverlay">
    <div class="mutuo-alert" id="mutuoAlerta">
      <div class="mutuo-check-wrap">
        <div class="mutuo-circle" id="mutuoCircle"></div>
        <div class="mutuo-check">
          <svg viewBox="0 0 36 36">
            <polyline class="check-path" id="mutuoCheckPath" points="7,19 15,27 29,11"/>
          </svg>
        </div>
      </div>
      <p class="mutuo-title" id="mutuoAlertTitle">Bem-vindo de volta!</p>
      <p class="mutuo-sub" id="mutuoAlertSub">Login realizado com sucesso</p>
      <div class="mutuo-bar-wrap"><div class="mutuo-bar" id="mutuoBar"></div></div>
      <p class="mutuo-hint">Redirecionando...</p>
    </div>
  </div>

<script>
  let tipoSelecionado = 'usuario';

  function selecionarTipo(tipo) {
    tipoSelecionado = tipo;
    const toggle = document.getElementById('toggleTipo');
    document.getElementById('btnUsuario').classList.toggle('ativo', tipo === 'usuario');
    document.getElementById('btnOng').classList.toggle('ativo', tipo === 'ong');
    toggle.classList.toggle('ong-ativo', tipo === 'ong');

    document.getElementById('labelLogin').textContent = tipo === 'ong' ? 'E-mail da ONG' : 'E-mail';
    document.getElementById('login').placeholder = tipo === 'ong' ? 'E-mail da ONG' : 'Seu e-mail';
    document.getElementById('erroEmail').textContent = '';
    document.getElementById('erroSenha').textContent = '';
  }

  document.getElementById('logar').addEventListener('click', () => {
    const loginValue = document.getElementById('login').value.trim();
    const senhaValue = document.getElementById('senha').value.trim();
    const erroEmail  = document.getElementById('erroEmail');
    const erroSenha  = document.getElementById('erroSenha');

    erroEmail.textContent = '';
    erroSenha.textContent = '';

    let valido = true;

    if (!loginValue) {
      erroEmail.textContent = 'Digite seu e-mail.';
      valido = false;
    }

    if (!senhaValue) {
      erroSenha.textContent = 'Digite sua senha.';
      valido = false;
    } else if (senhaValue.length < 3) {
      erroSenha.textContent = 'A senha deve ter no mínimo 3 caracteres.';
      valido = false;
    }

    if (valido) fazerLogin();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('logar').click();
  });

  function mostrarAlertMutuo(tipo) {
    const overlay = document.getElementById('mutuoOverlay');
    const circle  = document.getElementById('mutuoCircle');
    const path    = document.getElementById('mutuoCheckPath');
    const bar     = document.getElementById('mutuoBar');

    document.getElementById('mutuoAlertTitle').textContent =
      tipo === 'ong' ? 'ONG conectada!' : 'Bem-vindo de volta!';
    document.getElementById('mutuoAlertSub').textContent =
      tipo === 'ong' ? 'Acesso da ONG realizado com sucesso' : 'Login realizado com sucesso';

    circle.classList.remove('pulse');
    path.classList.remove('draw');
    bar.classList.remove('go');
    void circle.offsetWidth; // força reflow para reiniciar animações

    overlay.classList.add('show');
    setTimeout(() => {
      circle.classList.add('pulse');
      path.classList.add('draw');
      bar.classList.add('go');
    }, 80);
  }

  function fazerLogin() {
    const email = document.getElementById('login').value.trim();
    const senha = document.getElementById('senha').value.trim();

    const endpoint = tipoSelecionado === 'ong'
      ? 'http://localhost:3000/loginOng'
      : 'http://localhost:3000/loginUsuario';

    fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    })
      .then(resposta => {
        if (!resposta.ok) {
          return resposta.json().then(data => { throw new Error(data.mensagem || 'Erro desconhecido'); });
        }
        return resposta.json();
      })
      .then(resultado => {
        if (resultado.sucesso === true) {

          if (tipoSelecionado === 'ong') {
            sessionStorage.setItem('ongLogada', JSON.stringify(resultado.usuario));
          } else {
            sessionStorage.setItem('usuarioLogado', JSON.stringify(resultado.usuario));
          }

          mostrarAlertMutuo(tipoSelecionado);

          setTimeout(() => {
            window.location.href = tipoSelecionado === 'ong'
              ? 'usuárioOng/homeOngMutuo.html'
              : 'usuárioComum/homeMutuo.html';
          }, 2000);

        } else {
          Swal.fire({
            icon: 'error',
            title: resultado.mensagem || 'E-mail ou senha incorretos!'
          });
        }
      })
      .catch(erro => {
        console.error(erro);
        Swal.fire({
          icon: 'error',
          title: erro.message === 'Failed to fetch'
            ? 'Não foi possível conectar à API. Verifique se o servidor está rodando.'
            : erro.message || 'Erro ao conectar com a API'
        });
      });
  }
</script>
</body>
</html>
