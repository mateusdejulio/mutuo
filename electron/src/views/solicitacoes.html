        <div id="dashboard">

                        <span class="col-titulo">Aceitas</span>

                        <span class="col-texto"><img src="../public/img/realizada.png" height="25px" class="icone_card"><span id="totalAceita"></span>
                    </div>
                    <div class="col">
                        <span class="col-titulo">Pendentes</span>

    <link rel="stylesheet" href="../../node_modules/sweetalert2/dist/sweetalert2.min.css">

    <!--<script src="../../renderer.js"></script>-->
    <script src="../../node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
    <script src="../public/js/bootstrap.min.js"></script>
    
    <script>

        const totalA = document.getElementById('totalAceita');
        const totalP = document.getElementById('totalPendente');
        const totalR = document.getElementById('totalRecusada');
        const tbody = document.getElementById('tbody'); 
        let listaSolicitacoes = [];

        window.addEventListener('DOMContentLoaded', async () => {

            const usuario = localStorage.getItem('usuarioLogado');

            if (usuario) {
                document.getElementById('nomeAdm').textContent = " " + usuario;
            }

            let aceita = 0;
            let pendente = 0;
            let recusada = 0;

            try {
                aceita = await window.api.totalSolicitacoesAceitas();
                totalA.innerHTML = aceita;
            }
            catch (error){
                console.error('Erro ao buscar total de solicitaçoes aceitas', error);
                totalA.textContent = 'Erro!';
            }

            try {
                pendente = await window.api.totalSolicitacoesPendentes();
                totalP.innerHTML = pendente;
            }
            catch (error) {
                console.error('Erro ao buscar total de solicitações pendentes', error);
                totalP.textContent = 'Erro!';
            }

            try {
                recusada = await window.api.totalSolicitacoesRecusadas();
                totalR.innerHTML = recusada;
            }
            catch (error) {
                console.error('Erro ao buscar total de solicitações recusadas', error);
                totalR.textContent = 'Erro!';
            }

            carregarTabela();
        });

        async function carregarTabela() {
            tbody.innerHTML = '<tr><td colspan="8">Carregando...</td></tr>';

            try {
                //const solicitacoes = await window.api.buscarSolicitacoes();
                //if (solicitacoes.error) throw new Error(solicitacoes.error);
                listaSolicitacoes = await window.api.buscarSolicitacoes();
                renderizarTabela(listaSolicitacoes);
            }
            catch (err) {
                console.error("Erro ao buscar solicitações:", err);
                tbody.innerHTML = `<tr><td colspan="7">Erro ao carregar dados: ${err.message}</td></tr>`;
            }
        }

        function renderizarTabela(solicitacoes) {
            tbody.innerHTML = '';

            if (solicitacoes.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8">Nenhuma solicitação encontrada</td></tr>`;
                return;
            }

            tbody.innerHTML = '';

            for (const solicitacao of solicitacoes) {
                const linha = document.createElement('tr');
                linha.setAttribute('data-cod', solicitacao.codSolicitacao);

                let data = solicitacao.dataSolicitacao;;

                const dataFormatada = data
                    ? new Date(data).toLocaleDateString('pt-BR') 
                    : 'N/A';

                linha.innerHTML = `
                    <td class="tdTabela">${solicitacao.nomeServico}</td>
                    <td class="tdTabela">${solicitacao.nomeSolicitador}</td>
                    <td class="tdTabela">${solicitacao.nomePrestador}</td>
                    <td class="editavel tdTabela" data-coluna="statusS" data-valor="${solicitacao.statusSolicitacao}">${solicitacao.statusSolicitacao}</td>
                    <td class="editavel tdTabela" data-coluna="statusE" data-valor="${solicitacao.statusExecucao}">${solicitacao.statusExecucao}</td>
                    <td class="tdTabela">${dataFormatada}</td>
                    <td class="editavel tdTabela" data-coluna="pontos" data-valor="${solicitacao.pontos}">🪙${solicitacao.pontos}</td>
                    
                    <td data-tipo="acoes" style="width: 70px;">
                        <button id="salvar" class="save-btn" style="display: none;">Salvar</button>
                    </td>
                `;
                tbody.appendChild(linha);
            }
        }

        tbody.addEventListener('dblclick', (e) => {
            if (e.target.classList.contains('editavel')) {
           
                if (document.querySelector('.save-btn[style*="inline-block"]')) {
                    alert("Salve a linha que já está em edição primeiro.");
                    return;
                }
                const tr = e.target.closest('tr');
                switchToEditMode(tr);
            }
        });

        function switchToEditMode(tr) {

            const tdStatusS = tr.querySelector('td[data-coluna="statusS"]');
            const tdStatusE = tr.querySelector('td[data-coluna="statusE"]');
            const tdPontos = tr.querySelector('td[data-coluna="pontos"]');
            
            const tdAcoes = tr.querySelector('td[data-tipo="acoes"]');

            const valStatusS = tdStatusS.dataset.valor;
            const valStatusE = tdStatusE.dataset.valor;
            const valPontos = tdPontos.dataset.valor;

            tdStatusS.innerHTML = tdStatusS.innerHTML = `
                    <select id="input-select" class="edit-input" data-coluna="statusS">
                        <option value="Pendente">Pendente</option>
                        <option value="Aceita">Aceita</option>
                        <option value="Recusada">Recusada</option>
                    </select>
                `;
            tdStatusS.querySelector('#input-select').value = valStatusS;
            tdStatusE.innerHTML = tdStatusE.innerHTML = `
                    <select id="input-select" class="edit-input" data-coluna="statusE">
                        <option value="Pendente">Pendente</option>
                        <option value="Realizada">Realizada</option>
                    </select>
                `;
            tdStatusE.querySelector('#input-select').value = valStatusE;
            /*tdStatus.innerHTML = `<input type="text" id="input-text" class="edit-input" data-coluna="status" value="${valStatus}">`;*/
            tdPontos.innerHTML = `<input type="number" min="0" class="edit-input" data-coluna="pontos" value="${valPontos}">`;

            const saveBtn = tdAcoes.querySelector('.save-btn');
            saveBtn.style.display = 'inline-block';
        }

        tbody.addEventListener('click', async (e) => {
     
            if (e.target.classList.contains('save-btn')) {
                
                const tr = e.target.closest('tr');
                const cod = tr.dataset.cod;

                const newStatusS = tr.querySelector('select[data-coluna="statusS"]').value;
                const newStatusE = tr.querySelector('select[data-coluna="statusE"]').value;
                const newPontos = tr.querySelector('input[data-coluna="pontos"]').value;

                try {
                    const resultado = await window.api.editarSolicitacao(cod, newStatusS, newStatusE, newPontos);
                    
                    if (resultado.error) {
                        throw new Error(resultado.error);
                    }

                    await carregarTabela();
                    
                } catch (err) {
                    alert("Erro ao salvar: " + err.message);
                }
            }
        });

        const buttonSair = document.getElementById('sair');

        buttonSair.addEventListener('click', () => {
            localStorage.removeItem('usuarioLogado');
            window.api.abrirJanelaLogin();
        });

        const inputBusca = document.getElementById('search');

        let timeout;

        inputBusca.addEventListener('input', function () {
            clearTimeout(timeout);

            timeout = setTimeout(() => {
                const texto = this.value.toLowerCase().trim();

                const filtrados = listaSolicitacoes.filter(solicitacao=>
                    solicitacao.nomeServico.toLowerCase().includes(texto)
                );

                renderizarTabela(filtrados);
            }, 300); // delay = UX melhor
        });
    </script>
</body>
